name: Build and Deploy to ECS

# Deploys on every push to main. Builds both container images, pushes them to
# ECR, and forces the ECS service to pull the new images. No CloudShell needed.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 872709212513.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER: pc-tool-cluster
  SERVICE: pc-tool

permissions:
  id-token: write     # required for OIDC auth to AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          docker build -t "$ECR_REGISTRY/pc-tool-backend:latest" ./backend
          docker push "$ECR_REGISTRY/pc-tool-backend:latest"

      - name: Build and push frontend image
        run: |
          docker build -t "$ECR_REGISTRY/pc-tool-frontend:latest" ./frontend
          docker push "$ECR_REGISTRY/pc-tool-frontend:latest"

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" \
            --query 'service.serviceName' --output text

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region "$AWS_REGION"
          echo "Deployment stable."
